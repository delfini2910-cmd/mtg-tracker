<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#1a0a2e"/>
  <rect width="512" height="512" rx="80" fill="url(#bg)" opacity="0.6"/>
  <defs>
    <radialGradient id="bg" cx="30%" cy="20%">
      <stop offset="0%" stop-color="#4a2080"/>
      <stop offset="100%" stop-color="#0d0618"/>
    </radialGradient>
  </defs>
  <!-- Sword shape -->
  <g transform="translate(256,256)">
    <!-- Blade -->
    <polygon points="0,-180 18,-40 -18,-40" fill="#d8b4fe" opacity="0.95"/>
    <!-- Guard -->
    <rect x="-55" y="-40" width="110" height="22" rx="6" fill="#a855f7"/>
    <!-- Handle -->
    <rect x="-14" y="-18" width="28" height="90" rx="8" fill="#7c3aed"/>
    <!-- Pommel -->
    <ellipse cx="0" cy="80" rx="22" ry="16" fill="#a855f7"/>
    <!-- Shine on blade -->
    <polygon points="0,-175 5,-80 0,-85" fill="white" opacity="0.3"/>
  </g>
  <!-- Mana dots bottom -->
  <circle cx="156" cy="430" r="12" fill="#f8f0ff" opacity="0.7"/>
  <circle cx="206" cy="430" r="12" fill="#3b82f6" opacity="0.7"/>
  <circle cx="256" cy="430" r="12" fill="#7c6a90" opacity="0.7"/>
  <circle cx="306" cy="430" r="12" fill="#dc2626" opacity="0.7"/>
  <circle cx="356" cy="430" r="12" fill="#059669" opacity="0.7"/>
</svg>
